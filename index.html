<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Road Alert v21.4</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" onerror="this.onerror=null;this.href='https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css';">
<style>
  :root {
    --bg: #f5f1e8;
    --bg-card: #fffcf5;
    --bg-soft: #ede5d3;
    --ink: #1c1917;
    --ink-soft: #57534e;
    --ink-faint: #a8a29e;
    --line: #d6d3c4;
    --amber: #d97706;
    --red: #dc2626;
    --green: #65a30d;
    --blue: #2563eb;
    --mono: 'SF Mono', Menlo, Consolas, monospace;
  }

- { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
  font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(–bg);
  color: var(–ink);
  -webkit-font-smoothing: antialiased;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  }
  button { font-family: inherit; }

/* === Main shell === */
.shell {
display: flex;
flex-direction: column;
height: 100vh;
height: 100dvh;
}

/* === Top bar (compact) === */
.topbar {
display: flex; align-items: center; gap: 6px;
padding: 4px 8px;
background: var(–bg-card);
border-bottom: 1px solid var(–line);
font-family: var(–mono);
font-size: 11px;
flex-shrink: 0;
}
.topbar .brand {
display: flex; align-items: center; gap: 4px;
font-weight: 700; color: var(–ink); font-size: 11px;
}
.topbar .brand-dot {
width: 8px; height: 8px; border-radius: 50%;
border: 1.5px solid var(–amber);
position: relative;
}
.topbar .brand-dot::after {
content: ‘’; position: absolute;
top: 50%; left: 50%;
width: 2px; height: 2px; border-radius: 50%; background: var(–amber);
transform: translate(-50%, -50%);
}
.topbar .v { color: var(–amber); font-size: 9px; font-weight: 700; }
.topbar .dest {
flex: 1; min-width: 0;
overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
color: var(–ink-soft); font-weight: 600;
text-align: center;
padding: 0 4px;
}
.topbar .menu-btn {
width: 28px; height: 26px;
background: var(–bg-card); border: 1px solid var(–line);
border-radius: 6px; cursor: pointer;
display: grid; place-items: center;
font-size: 13px; line-height: 1; color: var(–ink);
}
.topbar .menu-btn:active { background: var(–bg-soft); }

/* === Info row === */
.info {
display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
padding: 6px 8px;
background: var(–bg-card);
border-bottom: 1px solid var(–line);
flex-shrink: 0;
}
.box {
background: var(–bg-soft); border: 1px solid var(–line);
border-radius: 10px; padding: 8px;
min-width: 0;
}
.box-tag {
font-family: var(–mono); font-size: 9px;
color: var(–ink-soft); letter-spacing: 0.06em;
text-transform: uppercase; font-weight: 700;
margin-bottom: 4px;
}

/* Speed box (limit sign + speed number) */
.speed-inner {
display: flex; align-items: center; gap: 8px;
}
.limit-sign {
appearance: none; cursor: pointer;
width: 54px; height: 54px; border-radius: 50%;
border: 4px solid var(–red);
background: var(–bg-card);
display: flex; flex-direction: column; align-items: center; justify-content: center;
flex-shrink: 0;
padding: 0;
}
.limit-sign:active { background: var(–bg-soft); }
.limit-num {
font-family: var(–mono); font-size: 20px; font-weight: 800; line-height: 1;
color: var(–ink);
}
.limit-lbl {
font-family: var(–mono); font-size: 7px; color: var(–ink-soft);
letter-spacing: 0.06em;
}
.speed-text {
display: flex; flex-direction: column; min-width: 0; flex: 1;
}
.speed-num {
font-family: var(–mono); font-size: 30px; font-weight: 800; line-height: 1;
color: var(–ink); letter-spacing: -0.02em;
}
.speed-num.over { color: var(–red); }
.speed-unit {
font-family: var(–mono); font-size: 9px; color: var(–ink-soft);
}

/* Next ahead box */
.next-row {
display: flex; align-items: center; gap: 8px;
}
.next-icon { font-size: 24px; flex-shrink: 0; }
.next-mid { flex: 1; min-width: 0; }
.next-name {
font-family: var(–mono); font-size: 12px; font-weight: 700;
overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.next-sub {
font-family: var(–mono); font-size: 9px; color: var(–ink-soft);
}
.next-dist {
font-family: var(–mono); font-size: 22px; font-weight: 800; color: var(–amber);
flex-shrink: 0; line-height: 1;
}
.next-dist.urgent { color: var(–red); animation: pulse 1s infinite; }
@keyframes pulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.5; }
}
.next-empty {
color: var(–ink-faint); font-style: italic;
font-size: 11px; font-family: var(–mono);
}

/* === Map (fills middle) === */
.map-wrap {
flex: 1; min-height: 0;
position: relative;
background: #2a2520;
}
#map {
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
width: 100%; height: 100%;
background: #2a2520;
}
.map-overlay-btn {
position: absolute; right: 12px; bottom: 12px;
width: 44px; height: 44px; border-radius: 50%;
background: var(–bg-card); border: 1px solid var(–line);
cursor: pointer; z-index: 600;
display: grid; place-items: center; font-size: 18px;
box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.map-overlay-btn:active { background: var(–bg-soft); }

/* === Bottom controls === */
.controls {
display: flex; gap: 6px;
padding: 6px 8px;
background: var(–bg-card);
border-top: 1px solid var(–line);
flex-shrink: 0;
}
.ctrl-btn {
appearance: none; cursor: pointer;
padding: 10px 8px;
border: 1px solid var(–line);
background: var(–bg-card);
color: var(–ink);
border-radius: 8px;
font-family: var(–mono); font-size: 12px; font-weight: 700;
display: flex; align-items: center; justify-content: center; gap: 4px;
min-width: 0;
}
.ctrl-btn:active { transform: scale(0.97); }
.ctrl-btn.capture {
flex: 1; background: var(–red); color: #fff; border-color: var(–red);
}
.ctrl-btn.start {
flex: 1.3; background: var(–green); color: #0c0a09; border-color: var(–green);
}
.ctrl-btn.start.running {
background: var(–red); color: #fff; border-color: var(–red);
animation: gpsRun 2s infinite;
}
@keyframes gpsRun {
0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.5); }
50% { box-shadow: 0 0 0 6px rgba(220,38,38,0); }
}
.ctrl-btn.icon { width: 44px; padding: 10px; }

/* === Toast === */
.toast {
position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
background: rgba(28,25,23,0.95); color: #fff;
padding: 10px 18px; border-radius: 100px;
font-family: var(–mono); font-size: 12px;
z-index: 9999;
opacity: 0; pointer-events: none;
transition: opacity 0.2s;
box-shadow: 0 4px 14px rgba(0,0,0,0.3);
max-width: 90%; text-align: center;
}
.toast.show { opacity: 1; }

/* === Modal (sheet) === */
.modal {
position: fixed; inset: 0; z-index: 9500;
background: rgba(0,0,0,0.65);
display: none;
align-items: flex-end; justify-content: center;
-webkit-backdrop-filter: blur(2px);
backdrop-filter: blur(2px);
}
.modal.open { display: flex; }
.modal-card {
background: var(–bg-card);
width: 100%; max-width: 480px;
border-radius: 16px 16px 0 0;
padding: 14px 14px 24px;
max-height: 85vh; overflow-y: auto;
padding-bottom: calc(24px + env(safe-area-inset-bottom));
box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.3);
border-top: 2px solid var(–amber);
}
.modal-grip {
width: 40px; height: 4px; background: var(–line);
border-radius: 2px; margin: 0 auto 12px;
}
.modal-title {
font-family: var(–mono); font-size: 11px;
color: var(–ink-soft); letter-spacing: 0.08em;
text-transform: uppercase; font-weight: 700;
padding: 8px 4px 6px;
}
.modal-grid {
display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
margin-bottom: 10px;
}
.modal-btn {
appearance: none; cursor: pointer;
background: var(–bg-soft); border: 1px solid var(–line);
border-radius: 10px;
padding: 14px 10px;
font-family: var(–mono); font-size: 12px; font-weight: 700;
color: var(–ink);
display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.modal-btn .ic { font-size: 20px; }
.modal-btn:active { transform: scale(0.97); }
.modal-btn.active { background: var(–amber); color: #0c0a09; border-color: var(–amber); }
.modal-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.modal-row {
appearance: none; cursor: pointer;
background: var(–bg-soft); border: 1px solid var(–line);
border-radius: 10px;
padding: 12px 14px;
text-align: left;
font-family: var(–mono); font-size: 13px; color: var(–ink);
display: flex; align-items: center; gap: 8px;
}
.modal-row.active { background: var(–amber); color: #0c0a09; border-color: var(–amber); }
.modal-row .label { flex: 1; font-weight: 700; }
.modal-row .meta { font-size: 10px; color: var(–ink-soft); }
.modal-row.active .meta { color: rgba(0,0,0,0.6); }

/* Settings rows */
.set-row {
display: flex; flex-direction: column; gap: 4px;
padding: 10px 4px;
border-bottom: 1px solid var(–line);
}
.set-row:last-child { border-bottom: none; }
.set-row label {
font-family: var(–mono); font-size: 11px;
color: var(–ink-soft); font-weight: 700;
}
.set-row .opts { display: flex; gap: 4px; flex-wrap: wrap; }
.set-row .opts button {
appearance: none; cursor: pointer;
flex: 1; min-width: 60px;
padding: 8px 10px;
background: var(–bg-card); border: 1px solid var(–line);
border-radius: 8px;
font-family: var(–mono); font-size: 11px; font-weight: 700;
color: var(–ink);
}
.set-row .opts button.active {
background: var(–amber); color: #0c0a09; border-color: var(–amber);
}
.set-input {
padding: 8px 10px;
background: var(–bg-card); border: 1px solid var(–line);
border-radius: 8px;
font-family: var(–mono); font-size: 12px;
color: var(–ink); width: 100%;
}

/* Limit picker grid */
.limit-grid {
display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
margin-bottom: 10px;
}
.limit-pick {
appearance: none; cursor: pointer;
aspect-ratio: 1;
background: var(–bg-card); border: 3px solid var(–red);
border-radius: 50%;
font-family: var(–mono); font-size: 18px; font-weight: 800;
color: var(–ink);
}
.limit-pick.clear { border-color: var(–line); border-style: dashed; font-size: 11px; }

/* Capture grid */
.cap-grid {
display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
}
.cap-btn {
appearance: none; cursor: pointer;
background: var(–bg-soft); border: 1px solid var(–line);
border-radius: 10px; padding: 14px 10px;
font-family: var(–mono); font-size: 12px; font-weight: 700;
color: var(–ink);
display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.cap-btn:active { background: var(–bg-card); }
.cap-btn.active { background: var(–amber); color: #0c0a09; border-color: var(–amber); }
.cap-btn .ic { font-size: 26px; }

/* Leaflet map background dark */
.leaflet-container { background: #2a2520 !important; }
</style>

</head>
<body>
<div class="shell">
  <!-- Top bar -->
  <div class="topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      <span>Road Alert</span>
      <span class="v">v21.4</span>
    </div>
    <button class="dest" id="dest-btn">→ Pick destination</button>
    <button class="menu-btn" id="menu-btn" title="Menu">⋯</button>
  </div>

  <!-- Info row -->

  <div class="info">
    <div class="box">
      <div class="box-tag">Speed</div>
      <div class="speed-inner">
        <button class="limit-sign" id="limit-btn" title="Tap to change limit">
          <div class="limit-num" id="limit-num">—</div>
          <div class="limit-lbl">LIMIT</div>
        </button>
        <div class="speed-text">
          <div class="speed-num" id="speed-num">0</div>
          <div class="speed-unit">KM/H</div>
        </div>
      </div>
    </div>
    <div class="box">
      <div class="box-tag">Next ahead</div>
      <div id="next-content">
        <div class="next-empty">— nothing ahead —</div>
      </div>
    </div>
  </div>

  <!-- Map -->

  <div class="map-wrap">
    <div id="map"></div>
    <button class="map-overlay-btn" id="recenter-btn" title="Recenter">📍</button>
  </div>

  <!-- Bottom controls -->

  <div class="controls">
    <button class="ctrl-btn capture" id="capture-btn">📷 Capture</button>
    <button class="ctrl-btn start" id="start-btn">▶ Start GPS</button>
    <button class="ctrl-btn icon" id="settings-btn" title="Settings">⚙</button>
  </div>
</div>

<!-- Toast -->

<div class="toast" id="toast"></div>

<!-- Modals -->

<!-- Menu sheet -->

<div class="modal" id="menu-modal">
  <div class="modal-card">
    <div class="modal-grip"></div>
    <div class="modal-title">Quick actions</div>
    <div class="modal-grid">
      <button class="modal-btn" id="m-dest"><span class="ic">📍</span><span>Destinations</span></button>
      <button class="modal-btn" id="m-points"><span class="ic">📋</span><span>Saved points</span></button>
      <button class="modal-btn" id="m-export"><span class="ic">⬇</span><span>Backup data</span></button>
      <button class="modal-btn" id="m-import"><span class="ic">⬆</span><span>Restore backup</span></button>
      <button class="modal-btn" id="m-close" style="grid-column:span 2;"><span class="ic">✕</span><span>Close</span></button>
    </div>
    <input type="file" id="m-import-file" accept="application/json,.json" style="display:none;">
  </div>
</div>

<!-- Destination picker -->

<div class="modal" id="dest-modal">
  <div class="modal-card">
    <div class="modal-grip"></div>
    <div class="modal-title">Pick destination</div>
    <div class="modal-list" id="dest-list">
      <div style="color:var(--ink-faint);font-style:italic;padding:10px;text-align:center;font-family:var(--mono);font-size:11px;">No destinations yet — add one</div>
    </div>
    <div class="modal-title">Add new</div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px;">
      <input class="set-input" id="dest-name-input" placeholder="Name (e.g. Work to home)">
      <button class="ctrl-btn capture" id="dest-add-here" style="flex:1;">📍 Use current GPS location</button>
    </div>
  </div>
</div>

<!-- Saved points -->

<div class="modal" id="points-modal">
  <div class="modal-card">
    <div class="modal-grip"></div>
    <div class="modal-title" id="points-title">Saved points</div>
    <div class="modal-list" id="points-list"></div>
  </div>
</div>

<!-- Capture type picker -->

<div class="modal" id="capture-modal">
  <div class="modal-card">
    <div class="modal-grip"></div>
    <div class="modal-title">What did you spot?</div>
    <div class="cap-grid">
      <button class="cap-btn" data-cap="speed_cam"><span class="ic">📷</span><span>Speed cam</span></button>
      <button class="cap-btn" data-cap="mobile_cam"><span class="ic">📸</span><span>Mobile cam</span></button>
      <button class="cap-btn" data-cap="checkpoint"><span class="ic">🛂</span><span>Checkpoint</span></button>
      <button class="cap-btn" data-cap="speed_zone"><span class="ic">🚧</span><span>Speed zone</span></button>
      <button class="cap-btn" data-cap="petrol"><span class="ic">⛽</span><span>Petrol</span></button>
      <button class="cap-btn" data-cap="gate"><span class="ic">🚪</span><span>Gate</span></button>
      <button class="cap-btn" data-cap="other"><span class="ic">📌</span><span>Other</span></button>
      <button class="cap-btn" data-cap="cancel" style="background:transparent;"><span class="ic">✕</span><span>Cancel</span></button>
    </div>
  </div>
</div>

<!-- Edit point modal (v21.4) -->

<div class="modal" id="edit-point-modal">
  <div class="modal-card">
    <div class="modal-grip"></div>
    <div class="modal-title">Edit point</div>
    <div class="set-row">
      <label>Custom name (optional)</label>
      <input class="set-input" id="ep-name" placeholder="e.g. Speed cam by gas station">
    </div>
    <div class="set-row">
      <label>Type</label>
      <div class="cap-grid" style="margin-top:6px;">
        <button class="cap-btn" data-ep-type="speed_cam"><span class="ic">📷</span><span>Speed cam</span></button>
        <button class="cap-btn" data-ep-type="mobile_cam"><span class="ic">📸</span><span>Mobile cam</span></button>
        <button class="cap-btn" data-ep-type="checkpoint"><span class="ic">🛂</span><span>Checkpoint</span></button>
        <button class="cap-btn" data-ep-type="speed_zone"><span class="ic">🚧</span><span>Speed zone</span></button>
        <button class="cap-btn" data-ep-type="petrol"><span class="ic">⛽</span><span>Petrol</span></button>
        <button class="cap-btn" data-ep-type="gate"><span class="ic">🚪</span><span>Gate</span></button>
        <button class="cap-btn" data-ep-type="other"><span class="ic">📌</span><span>Other</span></button>
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-top:14px;">
      <button class="ctrl-btn" id="ep-cancel" style="flex:1;">Cancel</button>
      <button class="ctrl-btn capture" id="ep-delete" style="flex:1;">🗑 Delete</button>
      <button class="ctrl-btn start" id="ep-save" style="flex:1.2;">✓ Save</button>
    </div>
  </div>
</div>

<!-- Limit picker -->

<div class="modal" id="limit-modal">
  <div class="modal-card">
    <div class="modal-grip"></div>
    <div class="modal-title">Set speed limit</div>
    <div class="limit-grid">
      <button class="limit-pick" data-lim="40">40</button>
      <button class="limit-pick" data-lim="60">60</button>
      <button class="limit-pick" data-lim="80">80</button>
      <button class="limit-pick" data-lim="100">100</button>
      <button class="limit-pick" data-lim="120">120</button>
      <button class="limit-pick" data-lim="140">140</button>
      <button class="limit-pick clear" data-lim="">Clear</button>
      <button class="limit-pick clear" data-lim="-">Cancel</button>
    </div>
  </div>
</div>

<!-- Settings -->

<div class="modal" id="settings-modal">
  <div class="modal-card">
    <div class="modal-grip"></div>
    <div class="modal-title">Settings</div>
    <div class="set-row">
      <label>Sound</label>
      <div class="opts" id="opt-sound">
        <button data-sound="voice">🔊 Voice</button>
        <button data-sound="beep">🔉 Beep</button>
        <button data-sound="both">Both</button>
        <button data-sound="off">🔇 Off</button>
      </div>
    </div>
    <div class="set-row">
      <label>Voice type</label>
      <div class="opts" id="opt-voice">
        <button data-voice="female">♀ Female</button>
        <button data-voice="male">♂ Male</button>
        <button data-voice="none">None</button>
      </div>
    </div>
    <div class="set-row">
      <label>Alert distances (meters, comma separated)</label>
      <input class="set-input" id="opt-markers" placeholder="2000, 1000, 500">
    </div>
    <div class="set-row">
      <label>Speed over limit alert (km/h)</label>
      <input class="set-input" id="opt-over" type="number" min="0" max="50" placeholder="5">
    </div>
    <div style="margin-top:10px;">
      <button class="ctrl-btn capture" id="opt-test-sound" style="flex:1;width:100%;">🔊 Test sound</button>
    </div>
  </div>
</div>

<script>
// v21.3: load Leaflet with fallback CDN.
(function loadLeaflet(){
  function tryLoad(url, onfail){
    var s = document.createElement('script');
    s.src = url;
    s.onload = function(){ console.log('Leaflet loaded from', url); };
    s.onerror = function(){ console.warn('Leaflet load failed from', url); if (onfail) onfail(); };
    document.head.appendChild(s);
  }
  tryLoad('https://unpkg.com/leaflet@1.9.4/dist/leaflet.js', function(){
    tryLoad('https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js', function(){
      tryLoad('https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js');
    });
  });
})();
</script>

<script>
// =====================================================
// Road Alert v21 - Clean fresh build
// =====================================================
'use strict';

// v21.3: catch any uncaught errors and surface them
window.addEventListener('error', (e) => {
  console.error('[uncaught]', e.message, e.filename, e.lineno);
  try {
    const t = document.getElementById('toast');
    if (t) {
      t.textContent = 'Error: ' + (e.message || 'unknown') + (e.lineno ? ' (line ' + e.lineno + ')' : '');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 6000);
    }
  } catch(_){}
});
window.addEventListener('unhandledrejection', (e) => {
  console.error('[promise]', e.reason);
});

// --- Storage keys (same as old app so data carries over) ---
const STORAGE_DATA = 'roadAlert.v8.data';
const STORAGE_SETTINGS = 'roadAlert.v8.settings';

// --- State ---
let data = {
  destinations: [],
  points: [],
  activeDestinationId: null,
};
let settings = {
  sound: 'voice',
  voiceGender: 'female',
  alertMarkersM: [2000, 1000, 500],
  speedAlertOver: 5,

};

let prevPos = null;

let currentSpeed = 0; // m/s
let map = null;
let userMarker = null;
let pointMarkers = [];
let followUser = true;
const alertedMarkers = new Map(); // pointKey -> Set of meters

// =====================================================
// Geometry helpers
// =====================================================
function toRad(x) { return x * Math.PI / 180; }
function distanceKm(a, b) {
  if (!a || !b) return Infinity;
  const R = 6371;
  const dLat = toRad(b.lat - a.lat);
  const dLng = toRad(b.lng - a.lng);
  const A = Math.sin(dLat/2)**2 + Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(A), Math.sqrt(1-A));
}
function bearing(a, b) {
  if (!a || !b) return 0;
  const y = Math.sin(toRad(b.lng-a.lng)) * Math.cos(toRad(b.lat));
  const x = Math.cos(toRad(a.lat)) * Math.sin(toRad(b.lat)) -
            Math.sin(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.cos(toRad(b.lng-a.lng));
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

// =====================================================
// Audio (iOS-safe)
// =====================================================
let audioCtx = null;
let audioUnlocked = false;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') {
    try { audioCtx.resume(); } catch(e) {}
  }
}
function unlockAudio() {
  if (audioUnlocked) return;
  ensureAudio();
  if (audioCtx) {
    try {
      const b = audioCtx.createBuffer(1, 1, 22050);
      const s = audioCtx.createBufferSource();
      s.buffer = b; s.connect(audioCtx.destination); s.start(0);
    } catch(e) {}
  }
  // Prime speechSynthesis
  if ('speechSynthesis' in window) {
    try {
      const u = new SpeechSynthesisUtterance('');
      u.volume = 0;
      speechSynthesis.speak(u);
    } catch(e) {}
  }
  audioUnlocked = true;
}
['touchstart', 'touchend', 'mousedown', 'click'].forEach(ev =>
  document.addEventListener(ev, unlockAudio, { once: true, passive: true })
);

function playBeep(freq, dur) {
  ensureAudio();
  if (!audioCtx) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.value = freq || 800;
    o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.02);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + (dur || 0.2));
    o.start();
    o.stop(audioCtx.currentTime + (dur || 0.2));
  } catch(e) {}
}

let _voiceCache = null;
let _voiceCacheFor = null;
function pickVoice() {
  const pref = settings.voiceGender || 'female';
  if (pref === 'none') return null;
  if (_voiceCacheFor === pref && _voiceCache) return _voiceCache;
  if (!('speechSynthesis' in window)) return null;
  const voices = speechSynthesis.getVoices();
  if (!voices || !voices.length) return null;
  const femaleNames = ['Samantha', 'Karen', 'Moira', 'Tessa', 'Veena', 'Fiona', 'Victoria'];
  const maleNames = ['Daniel', 'Alex', 'Aaron', 'Fred', 'Tom', 'Oliver'];
  const wanted = pref === 'male' ? maleNames : femaleNames;
  const enVoices = voices.filter(v => /en[-_]/i.test(v.lang) || v.lang === 'en');
  for (const name of wanted) {
    const v = enVoices.find(x => x.name.includes(name));
    if (v) { _voiceCache = v; _voiceCacheFor = pref; return v; }
  }
  if (enVoices[0]) { _voiceCache = enVoices[0]; _voiceCacheFor = pref; return enVoices[0]; }
  _voiceCache = voices[0]; _voiceCacheFor = pref; return voices[0];
}
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  if (settings.voiceGender === 'none') return;
  try {
    const u = new SpeechSynthesisUtterance(text);
    const v = pickVoice();
    if (v) { u.voice = v; u.lang = v.lang; }
    u.rate = 1.0;
    speechSynthesis.speak(u);
  } catch(e) {}
}
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => { _voiceCache = null; _voiceCacheFor = null; };
}

// Fire alert (beep + voice depending on settings)
function alert(point, meters) {
  const distTxt = meters >= 1000 ? (meters/1000) + ' kilometer' : meters + ' meters';
  const typeTxt = pointLabel(point.type);
  if (settings.sound === 'beep' || settings.sound === 'both') {
    playBeep(900, 0.15);
    setTimeout(() => playBeep(700, 0.15), 200);
  }
  if (settings.sound === 'voice' || settings.sound === 'both') {
    speak(typeTxt + ' in ' + distTxt);
  }
}

// =====================================================
// Map
// =====================================================
function initMap() {
  if (map) return;
  // v21.3: guard against Leaflet not loaded (CDN failure)
  if (typeof L === 'undefined') {
    console.warn('Leaflet not loaded — map disabled');
    const wrap = document.getElementById('map');
    if (wrap) {
      wrap.style.background = '#2a2520';
      wrap.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#a8a29e;font-family:monospace;font-size:11px;padding:20px;text-align:center;">' +
        '<div style="font-size:32px;margin-bottom:8px;">🗺</div>' +
        '<div>Map library failed to load.</div>' +
        '<div style="margin-top:6px;opacity:0.6;">Check internet and reload.</div>' +
        '<button onclick="location.reload()" style="margin-top:12px;padding:8px 14px;background:#d97706;color:#000;border:none;border-radius:6px;font-family:monospace;font-weight:700;">Reload</button>' +
        '</div>';
    }
    return;
  }
  try {
    map = L.map('map', {
      center: [21.4858, 39.1925], // Jeddah default
      zoom: 13,
      zoomControl: true,
      attributionControl: false,
    });
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 19,
      attribution: 'Esri',
    }).addTo(map);
    // User-interaction stops auto-follow
    map.on('dragstart', () => { followUser = false; });
    map.on('zoomstart', (e) => {
      if (e.target._zoomingProgrammatically) return;
    });
    refreshMapMarkers();
    setTimeout(() => map.invalidateSize(true), 300);
  } catch (err) {
    console.error('Map init failed:', err);
    showToast('Map failed: ' + (err.message || err));
  }
}

function refreshMapMarkers() {
  if (!map || typeof L === 'undefined') return;
  // Clear old markers
  pointMarkers.forEach(m => m.remove());
  pointMarkers = [];
  // Add current destination's points
  const dest = activeDest();
  if (!dest) return;
  const pts = data.points.filter(p => p.destinationId === dest.id);
  pts.forEach(p => {
    const icon = L.divIcon({
      className: 'custom-pt-icon',
      html: '<div style="background:#fff;border:2px solid #d97706;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,0.3);">' + pointIcon(p) + '</div>',
      iconSize: [28, 28], iconAnchor: [14, 14],
    });
    const m = L.marker([p.lat, p.lng], { icon }).addTo(map);
    // v21.4: rich popup with edit and delete
    const labelEscaped = escapeHtml(p.name || pointLabel(p.type));
    const pidEscaped = escapeHtml(p.id);
    m.bindPopup(
      '<div style="font-family:monospace;font-size:12px;min-width:160px;">' +
        '<div style="font-weight:700;margin-bottom:6px;">' + pointIcon(p) + ' ' + labelEscaped + '</div>' +
        '<div style="display:flex;gap:4px;">' +
          '<button onclick="openEditPoint(\'' + pidEscaped + '\')" style="flex:1;padding:6px 8px;background:#d97706;color:#000;border:none;border-radius:6px;font-family:monospace;font-weight:700;font-size:11px;cursor:pointer;">✎ Edit</button>' +
          '<button onclick="deletePoint(\'' + pidEscaped + '\')" style="flex:1;padding:6px 8px;background:#dc2626;color:#fff;border:none;border-radius:6px;font-family:monospace;font-weight:700;font-size:11px;cursor:pointer;">🗑 Delete</button>' +
        '</div>' +
      '</div>'
    );
    pointMarkers.push(m);
  });
  // Destination marker (flag)
  const destIcon = L.divIcon({
    className: 'dest-icon',
    html: '<div style="background:#dc2626;color:#fff;border:2px solid #fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,0.4);">🚩</div>',
    iconSize: [30, 30], iconAnchor: [15, 15],
  });
  const dm = L.marker([dest.lat, dest.lng], { icon: destIcon }).addTo(map);
  dm.bindPopup(escapeHtml(dest.name));
  pointMarkers.push(dm);
}

function updateUserMarker() {
  if (!map || !currentPos || typeof L === 'undefined') return;
  if (!userMarker) {
    const userIcon = L.divIcon({
      className: 'user-icon',
      html: '<div style="background:#2563eb;border:3px solid #fff;border-radius:50%;width:18px;height:18px;box-shadow:0 0 0 4px rgba(37,99,235,0.3);"></div>',
      iconSize: [18, 18], iconAnchor: [9, 9],
    });
    userMarker = L.marker([currentPos.lat, currentPos.lng], { icon: userIcon, zIndexOffset: 1000 }).addTo(map);
  } else {
    userMarker.setLatLng([currentPos.lat, currentPos.lng]);
  }
  if (followUser) {
    map._zoomingProgrammatically = true;
    map.setView([currentPos.lat, currentPos.lng], map.getZoom() || 15, { animate: true });
    setTimeout(() => { map._zoomingProgrammatically = false; }, 300);
  }
}

// Destinations
// =====================================================
function activeDest() {
  return data.destinations.find(d => d.id === data.activeDestinationId);
}

function addDestination(name, lat, lng) {
  const id = 'dest_' + Date.now();
  const dest = { id, name, lat, lng };
  data.destinations.push(dest);
  data.activeDestinationId = id;
  saveData();
  return dest;
}

function setActiveDest(id) {
  data.activeDestinationId = id;
  // Reset alert state when switching
  alertedMarkers.clear();
  passedPoints.clear();
  saveData();
  refreshMapMarkers();
  refreshUI();
  // Recenter map on destination
  if (map) {
    const d = activeDest();
    if (d) map.setView([d.lat, d.lng], 13);

// =====================================================
// GPS
// =====================================================
function startGPS() {
  if (!('geolocation' in navigator)) {
    showToast('No GPS support on this device');
    return;
  }
  if (!activeDest()) {
    showToast('Pick a destination first');
    openModal('dest-modal');
    return;
  }
  unlockAudio();
  mode = 'gps';
  watchId = navigator.geolocation.watchPosition(onGPS, onGPSError, {
    enableHighAccuracy: true,
    maximumAge: 1000,
    timeout: 30000,
  });
  refreshUI();
  showToast('GPS started');
}
function stopGPS() {
  if (watchId != null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
  mode = 'idle';
  currentSpeed = 0;
  refreshUI();
  showToast('GPS stopped');
}
function onGPS(pos) {
  prevPos = currentPos;
  const prevTs = lastGPSTimestamp;
  currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
  lastGPSTimestamp = pos.timestamp || Date.now();
  if (pos.coords.speed != null && !isNaN(pos.coords.speed) && pos.coords.speed >= 0) {
    currentSpeed = pos.coords.speed; // m/s from GPS
  } else if (prevPos && prevTs) {
    // v21.1: fallback uses distance over time delta, not just distance * 1000
    const dtSec = (lastGPSTimestamp - prevTs) / 1000;
    if (dtSec > 0 && dtSec < 30) {
      const meters = distanceKm(prevPos, currentPos) * 1000;
      // Reject single-tick jumps > 500m (GPS glitches)
      if (meters < 500) {
        currentSpeed = meters / dtSec; // m/s
      }
    }
  }
  // Sanity: cap speed to 350 km/h
  if (currentSpeed * 3.6 > 350) currentSpeed = 0;
  updateUserMarker();
  refreshUI();
  checkAlerts();
}
function onGPSError(err) {
  console.warn('GPS error', err);
  showToast('GPS error: ' + (err.message || 'unknown'));
}

// =====================================================
// Alerts: find nearest point ahead of us
// =====================================================
function nearestPointAhead() {
  if (!currentPos) return null;
  const dest = activeDest();
  if (!dest) return null;
  const pts = data.points.filter(p => p.destinationId === dest.id);
  if (!pts.length) return null;
  const heading = prevPos ? bearing(prevPos, currentPos) : null;
  let best = null;
  let bestDist = Infinity;
  pts.forEach(p => {
    if (passedPoints.has(p.id)) return;
    const d = distanceKm(currentPos, p);
    // If we have a heading, prefer points within ±90° of forward
    if (heading != null) {
      const toPt = bearing(currentPos, p);
      let diff = Math.abs(((toPt - heading + 540) % 360) - 180);
      if (diff > 90) return; // behind us
    }
    if (d < bestDist) {
      bestDist = d;
      best = { point: p, distKm: d };
    }
  });
  return best;
}

function checkAlerts() {
  if (mode !== 'gps') return;
  const dest = activeDest();
  if (!dest) return;
  // v21.1: check ALL points within 5km (not just nearest), so we don't miss
  // any when GPS jumps. Each point tracks its own previous distance.
  const pts = data.points.filter(p => p.destinationId === dest.id);
  pts.forEach(p => {
    if (passedPoints.has(p.id)) return;
    const distKm = distanceKm(currentPos, p);
    if (distKm > 5) {
      // Too far; clear stale state for this point
      lastDistByPoint.delete(p.id);
      return;
    }
    const meters = distKm * 1000;
    const prevMeters = lastDistByPoint.get(p.id);
    // Heading check: only alert points roughly ahead of us
    let ahead = true;
    if (prevPos) {
      const heading = bearing(prevPos, currentPos);
      const toPt = bearing(currentPos, p);
      const diff = Math.abs(((toPt - heading + 540) % 360) - 180);
      if (diff > 90) ahead = false;
    }
    if (!ahead) {
      // We've passed this point or it's beside/behind us
      if (prevMeters != null && meters > prevMeters && meters > 80) {
        // Moving away from a behind-point that's now > 80m → mark as passed
        passedPoints.add(p.id);
        alertedMarkers.delete(p.id);
        lastDistByPoint.delete(p.id);
      } else {
        lastDistByPoint.set(p.id, meters);
      }
      return;
    }
    // Fire markers that we just crossed (was > marker, now <= marker)
    const fired = alertedMarkers.get(p.id) || new Set();
    for (const m of settings.alertMarkersM) {
      if (fired.has(m)) continue;
      if (prevMeters == null) {
        // First time we're seeing this point — only fire if very close
        if (meters <= m && meters > m - 200) {
          alert(p, m);
          fired.add(m);
        }
      } else {
        // Threshold crossing: was above, now at or below
        if (prevMeters > m && meters <= m) {
          alert(p, m);
          fired.add(m);
        }
      }
    }
    alertedMarkers.set(p.id, fired);
    lastDistByPoint.set(p.id, meters);
  });
}

// =====================================================
// UI updates
// =====================================================
function refreshUI() {
  // Destination button text
  const dest = activeDest();
  const destBtn = document.getElementById('dest-btn');
  if (dest) {
    const km = currentPos ? distanceKm(currentPos, dest).toFixed(1) + ' km' : '';
    destBtn.textContent = '→ ' + dest.name + (km ? ' · ' + km : '');
  } else {
    destBtn.textContent = '→ Pick destination';
  }
  // Speed
  const speedKmh = Math.round(currentSpeed * 3.6);
  const speedNum = document.getElementById('speed-num');
  speedNum.textContent = speedKmh;
  const lim = currentLimit();
  speedNum.classList.toggle('over', lim != null && speedKmh > lim + settings.speedAlertOver);
  // Limit
  document.getElementById('limit-num').textContent = lim != null ? lim : '—';
  // Next ahead
  const next = nearestPointAhead();
  const nextEl = document.getElementById('next-content');
  if (next && mode === 'gps') {
    const meters = Math.round(next.distKm * 1000);
    const distTxt = meters < 1000 ? meters + 'm' : next.distKm.toFixed(1) + 'km';
    const isUrgent = meters <= 500;
    nextEl.innerHTML = `
      <div class="next-row">
        <span class="next-icon">${pointIcon(next.point)}</span>
        <div class="next-mid">
          <div class="next-name">${escapeHtml(pointLabel(next.point.type))}</div>
          <div class="next-sub">heading toward</div>
        </div>
        <div class="next-dist ${isUrgent ? 'urgent' : ''}">${distTxt}</div>
      </div>
    `;
  } else {
    nextEl.innerHTML = '<div class="next-empty">— nothing ahead —</div>';
  }
  // Start button
  const startBtn = document.getElementById('start-btn');
  if (mode === 'gps') {
    startBtn.classList.add('running');
    startBtn.textContent = '■ Stop';
  } else {
    startBtn.classList.remove('running');
    startBtn.textContent = '▶ Start GPS';
  }
}

function currentLimit() {
  return settings.manualLimit; // simplest: only manual for now
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

// =====================================================
// Toast

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

function openModal(id) {
  document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
  document.getElementById(id).classList.add('open');
  if (id === 'dest-modal') renderDestList();
  if (id === 'points-modal') renderPointsList();
  if (id === 'settings-modal') refreshSettingsUI();
}

// v21.4: open the edit modal for a specific point
function openEditPoint(pointId) {
  const p = data.points.find(x => x.id === pointId);
  if (!p) { showToast('Point not found'); return; }
  editingPointId = pointId;
  editingPointType = p.type;
  document.getElementById('ep-name').value = p.name || '';
  // Highlight current type
  document.querySelectorAll('[data-ep-type]').forEach(b =>
    b.classList.toggle('active', b.getAttribute('data-ep-type') === p.type)
  );
  closeModal();
  document.getElementById('edit-point-modal').classList.add('open');
}

// v21.4: delete a point with confirmation
function deletePoint(pointId) {
  const p = data.points.find(x => x.id === pointId);
  if (!p) return;
  const label = p.name || pointLabel(p.type);
  if (!confirm('Delete "' + label + '"?')) return;
  data.points = data.points.filter(x => x.id !== pointId);
  // Also clean up alert state
  alertedMarkers.delete(pointId);
  passedPoints.delete(pointId);
  lastDistByPoint.delete(pointId);
  saveData();
  refreshMapMarkers();
  refreshUI();
  showToast('Deleted');
}
// Expose for inline onclick from marker popup
window.deletePoint = deletePoint;
window.openEditPoint = openEditPoint;
function closeModal(id) {
  if (id) document.getElementById(id).classList.remove('open');
  else document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
}
document.querySelectorAll('.modal').forEach(modal => {
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });
});

// Destination list
function renderDestList() {
  const list = document.getElementById('dest-list');
  if (!data.destinations.length) {
    list.innerHTML = '<div style="color:var(--ink-faint);font-style:italic;padding:10px;text-align:center;font-family:var(--mono);font-size:11px;">No destinations yet — add one</div>';
    return;
  }
  list.innerHTML = '';
  data.destinations.forEach(d => {
    const isActive = d.id === data.activeDestinationId;
    const count = data.points.filter(p => p.destinationId === d.id).length;
    const row = document.createElement('button');
    row.className = 'modal-row' + (isActive ? ' active' : '');
    row.innerHTML = `
      <span class="label">${escapeHtml(d.name)}</span>
      <span class="meta">${count} points</span>
    `;
    row.addEventListener('click', () => {
      setActiveDest(d.id);
      closeModal('dest-modal');
    });
    list.appendChild(row);
  });
}

// Saved points list
function renderPointsList() {
  const dest = activeDest();
  const list = document.getElementById('points-list');
  document.getElementById('points-title').textContent = dest ? 'Points for: ' + dest.name : 'Saved points';
  if (!dest) {
    list.innerHTML = '<div style="color:var(--ink-faint);padding:10px;text-align:center;font-family:var(--mono);font-size:11px;">Pick a destination first</div>';
    return;
  }
  const pts = data.points.filter(p => p.destinationId === dest.id);
  list.innerHTML = '';
  // v21.4: Delete all button at top
  if (pts.length) {
    const topRow = document.createElement('div');
    topRow.style.cssText = 'display:flex;gap:6px;margin-bottom:6px;align-items:center;';
    topRow.innerHTML = '<div style="flex:1;font-family:var(--mono);font-size:11px;color:var(--ink-soft);">' + pts.length + ' point' + (pts.length === 1 ? '' : 's') + '</div>';
    const delAll = document.createElement('button');
    delAll.className = 'ctrl-btn';
    delAll.style.cssText = 'padding:8px 12px;font-size:11px;background:var(--red);color:#fff;border-color:var(--red);';
    delAll.textContent = '🗑 Delete all';
    delAll.addEventListener('click', () => {
      if (!confirm('Delete ALL ' + pts.length + ' points for "' + dest.name + '"? This cannot be undone.')) return;
      data.points = data.points.filter(p => p.destinationId !== dest.id);
      alertedMarkers.clear();
      passedPoints.clear();
      lastDistByPoint.clear();
      saveData();
      refreshMapMarkers();
      refreshUI();
      renderPointsList();
      showToast('All points deleted');
    });
    topRow.appendChild(delAll);
    list.appendChild(topRow);
  }
  if (!pts.length) {
    list.innerHTML = '<div style="color:var(--ink-faint);padding:10px;text-align:center;font-family:var(--mono);font-size:11px;">No points yet</div>';
    return;
  }
  // Render each point
  pts.forEach(p => {
    const row = document.createElement('div');
    row.className = 'modal-row';
    const distTxt = currentPos ? ' · ' + distanceKm(currentPos, p).toFixed(2) + 'km' : '';
    const displayName = p.name || pointLabel(p.type);
    row.innerHTML = `
      <span class="ic" style="font-size:18px;">${pointIcon(p)}</span>
      <span class="label">${escapeHtml(displayName)}<br><span style="font-size:9px;color:var(--ink-soft);">${pointLabel(p.type)} · ${p.lat.toFixed(4)}, ${p.lng.toFixed(4)}${distTxt}</span></span>
      <button class="ctrl-btn" data-edit="${escapeHtml(p.id)}" style="padding:6px 10px;font-size:10px;flex:0 0 auto;background:var(--amber);color:#000;border-color:var(--amber);">✎</button>
      <button class="ctrl-btn" data-del="${escapeHtml(p.id)}" style="padding:6px 10px;font-size:10px;flex:0 0 auto;">✕</button>
    `;
    row.querySelector('[data-edit]').addEventListener('click', (e) => {
      e.stopPropagation();
      openEditPoint(p.id);
    });
    row.querySelector('[data-del]').addEventListener('click', (e) => {
      e.stopPropagation();
      deletePoint(p.id);
      renderPointsList();
    });
    list.appendChild(row);
  });
}

// Settings UI sync
function refreshSettingsUI() {
  document.querySelectorAll('[data-sound]').forEach(b =>
    b.classList.toggle('active', b.getAttribute('data-sound') === settings.sound)
  );
  document.querySelectorAll('[data-voice]').forEach(b =>
    b.classList.toggle('active', b.getAttribute('data-voice') === settings.voiceGender)
  );
  document.getElementById('opt-markers').value = settings.alertMarkersM.join(', ');
  document.getElementById('opt-over').value = settings.speedAlertOver;
}

// =====================================================
// Wire up controls
// =====================================================
document.getElementById('menu-btn').addEventListener('click', () => openModal('menu-modal'));
document.getElementById('dest-btn').addEventListener('click', () => openModal('dest-modal'));
document.getElementById('limit-btn').addEventListener('click', () => openModal('limit-modal'));
document.getElementById('settings-btn').addEventListener('click', () => openModal('settings-modal'));
document.getElementById('start-btn').addEventListener('click', () => {
  if (mode === 'idle') startGPS(); else stopGPS();
});
document.getElementById('capture-btn').addEventListener('click', () => {
  if (!currentPos) { showToast('Need GPS fix first — start GPS'); return; }
  if (!activeDest()) { showToast('Pick a destination first'); openModal('dest-modal'); return; }
  openModal('capture-modal');
});
document.getElementById('recenter-btn').addEventListener('click', () => {
  followUser = true;
  if (map && currentPos) {
    map.setView([currentPos.lat, currentPos.lng], 15);
  } else if (map && activeDest()) {
    const d = activeDest();
    map.setView([d.lat, d.lng], 13);
  }
});

// Menu modal actions
document.getElementById('m-dest').addEventListener('click', () => { closeModal('menu-modal'); openModal('dest-modal'); });
document.getElementById('m-points').addEventListener('click', () => { closeModal('menu-modal'); openModal('points-modal'); });
document.getElementById('m-close').addEventListener('click', () => closeModal('menu-modal'));
document.getElementById('m-export').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify({
    destinations: data.destinations,
    points: data.points,
    settings,
    exportedAt: new Date().toISOString(),
  }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'road-alert-backup-' + Date.now() + '.json';
  document.body.appendChild(a); a.click(); a.remove();
  closeModal('menu-modal');
  showToast('Backup downloaded');
});
// v21.1: import
document.getElementById('m-import').addEventListener('click', () => {
  document.getElementById('m-import-file').click();
});
document.getElementById('m-import-file').addEventListener('change', (e) => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const obj = JSON.parse(ev.target.result);
      if (!obj || typeof obj !== 'object') throw new Error('not a json object');
      const destsIn = Array.isArray(obj.destinations) ? obj.destinations : [];
      const ptsIn = Array.isArray(obj.points) ? obj.points : [];
      // Merge by id (don't duplicate existing)
      const existingDestIds = new Set(data.destinations.map(d => d.id));
      const existingPtIds = new Set(data.points.map(p => p.id));
      let addedD = 0, addedP = 0;
      destsIn.forEach(d => {
        if (d && d.id && !existingDestIds.has(d.id) && typeof d.lat === 'number' && typeof d.lng === 'number') {
          data.destinations.push({ id: d.id, name: String(d.name || 'Unnamed'), lat: d.lat, lng: d.lng });
          addedD++;
        }
      });
      ptsIn.forEach(p => {
        if (p && p.id && !existingPtIds.has(p.id) && typeof p.lat === 'number' && typeof p.lng === 'number') {
          const newPt = {
            id: p.id,
            destinationId: String(p.destinationId || ''),
            type: String(p.type || 'other'),
            lat: p.lat, lng: p.lng,
            capturedAt: Number(p.capturedAt) || Date.now(),
          };
          if (typeof p.name === 'string' && p.name) newPt.name = p.name;
          data.points.push(newPt);
          addedP++;
        }
      });
      saveData();
      refreshMapMarkers();
      refreshUI();
      closeModal('menu-modal');
      showToast(`Imported: ${addedD} dests, ${addedP} points`);
    } catch (err) {
      showToast('Bad backup file');
      console.warn('import failed', err);
    }
    e.target.value = ''; // reset so same file can be re-picked
  };
  reader.readAsText(file);
});

// Destination modal: add current location
document.getElementById('dest-add-here').addEventListener('click', () => {
  const name = (document.getElementById('dest-name-input').value || '').trim();
  if (!name) { showToast('Type a name first'); return; }
  // Get current position even if GPS not started
  if (currentPos) {
    addDestination(name, currentPos.lat, currentPos.lng);
    document.getElementById('dest-name-input').value = '';
    closeModal('dest-modal');
    refreshMapMarkers();
    refreshUI();
    showToast('Added: ' + name);
  } else {
    showToast('Getting location...');
    navigator.geolocation.getCurrentPosition(pos => {
      const lat = pos.coords.latitude, lng = pos.coords.longitude;
      addDestination(name, lat, lng);
      document.getElementById('dest-name-input').value = '';
      closeModal('dest-modal');
      refreshMapMarkers();
      refreshUI();
      showToast('Added: ' + name);
    }, err => showToast('Location failed: ' + err.message), { enableHighAccuracy: true });
  }
});

// Capture buttons
document.querySelectorAll('[data-cap]').forEach(b => {
  b.addEventListener('click', () => {
    const type = b.getAttribute('data-cap');
    closeModal('capture-modal');
    if (type === 'cancel') return;
    if (!currentPos) { showToast('No GPS fix'); return; }
    const dest = activeDest();
    if (!dest) { showToast('No destination'); return; }
    const point = {
      id: 'pt_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
      destinationId: dest.id,
      type,
      lat: currentPos.lat,
      lng: currentPos.lng,
      capturedAt: Date.now(),
    };
    data.points.push(point);
    saveData();
    refreshMapMarkers();
    showToast('Saved: ' + pointLabel(type));
  });
});

// Limit picker
document.querySelectorAll('[data-lim]').forEach(b => {
  b.addEventListener('click', () => {
    const v = b.getAttribute('data-lim');
    closeModal('limit-modal');
    if (v === '-') return;
    if (v === '') { settings.manualLimit = null; saveSettings(); showToast('Limit cleared'); }
    else { settings.manualLimit = parseInt(v, 10); saveSettings(); showToast('Limit: ' + v + ' km/h'); }
    refreshUI();
  });
});

// v21.4: Edit-point modal wiring
document.querySelectorAll('[data-ep-type]').forEach(b => {
  b.addEventListener('click', () => {
    editingPointType = b.getAttribute('data-ep-type');
    document.querySelectorAll('[data-ep-type]').forEach(x =>
      x.classList.toggle('active', x.getAttribute('data-ep-type') === editingPointType)
    );
  });
});
document.getElementById('ep-cancel').addEventListener('click', () => {
  closeModal('edit-point-modal');
  editingPointId = null;
});
document.getElementById('ep-delete').addEventListener('click', () => {
  if (!editingPointId) return;
  const id = editingPointId;
  closeModal('edit-point-modal');
  editingPointId = null;
  deletePoint(id);
  // If points modal is reachable, refresh it
  if (document.getElementById('points-modal').classList.contains('open')) {
    renderPointsList();
  }
});
document.getElementById('ep-save').addEventListener('click', () => {
  if (!editingPointId) return;
  const p = data.points.find(x => x.id === editingPointId);
  if (!p) { closeModal('edit-point-modal'); return; }
  const newName = document.getElementById('ep-name').value.trim();
  p.name = newName || undefined;
  if (editingPointType) p.type = editingPointType;
  saveData();
  refreshMapMarkers();
  refreshUI();
  closeModal('edit-point-modal');
  editingPointId = null;
  if (document.getElementById('points-modal').classList.contains('open')) {
    renderPointsList();
  }
  showToast('Saved');
});

// Settings wiring
document.querySelectorAll('[data-sound]').forEach(b =>
  b.addEventListener('click', () => {
    settings.sound = b.getAttribute('data-sound');
    saveSettings();
    refreshSettingsUI();
    unlockAudio();
    if (settings.sound !== 'off') playBeep(800, 0.15);
  })
);
document.querySelectorAll('[data-voice]').forEach(b =>
  b.addEventListener('click', () => {
    settings.voiceGender = b.getAttribute('data-voice');
    _voiceCache = null; _voiceCacheFor = null;
    saveSettings();
    refreshSettingsUI();
    unlockAudio();
    if (settings.voiceGender !== 'none') speak('Voice set');
  })
);
document.getElementById('opt-markers').addEventListener('change', (e) => {
  const parts = (e.target.value || '').split(/[,\s]+/).map(x => parseInt(x, 10)).filter(x => x > 0).sort((a,b) => b-a);
  if (parts.length) {
    settings.alertMarkersM = parts;
    saveSettings();
    showToast('Markers: ' + parts.join('m, ') + 'm');
  }
});
document.getElementById('opt-over').addEventListener('change', (e) => {
  const v = parseInt(e.target.value, 10);
  if (!isNaN(v) && v >= 0 && v <= 50) {
    settings.speedAlertOver = v;
    saveSettings();
  }
});
document.getElementById('opt-test-sound').addEventListener('click', () => {
  unlockAudio();
  if (settings.sound === 'beep' || settings.sound === 'both') {
    playBeep(900, 0.15);
    setTimeout(() => playBeep(700, 0.15), 200);
  }
  if (settings.sound === 'voice' || settings.sound === 'both') {
    setTimeout(() => speak('Speed camera in 500 meters'), 400);
  }
});

// =====================================================
// Init
// =====================================================
function init() {
  try {
    loadData();
    loadSettings();
    initMap();
    refreshUI();
    // v21.1: do NOT request GPS silently on page load.
    // GPS permission is only asked when the user taps Start GPS,
    // or "Use current location" inside the Destinations modal.
    // Refresh UI on a slow tick so dest distance updates
    setInterval(refreshUI, 1000);
    // v21.1: driving safety reminder, once per device
    try {
      if (!localStorage.getItem('roadAlert.safetyShown')) {
        setTimeout(() => {
          showToast('Set up while parked. Drive safely.');
          localStorage.setItem('roadAlert.safetyShown', '1');
        }, 1500);
      }
    } catch(e) {}
  } catch (err) {
    console.error('init failed:', err);
    showToast('Init error: ' + (err.message || err));
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initWhenReady);
} else {
  initWhenReady();
}

// v21.3: wait briefly for Leaflet to load (it's loaded async with fallback)
function initWhenReady(){
  var tries = 0;
  function check(){
    if (typeof L !== 'undefined') {
      init();
      return;
    }
    tries++;
    if (tries > 30) { // ~6s
      console.warn('Leaflet never loaded; initializing without map');
      init();
      return;
    }
    setTimeout(check, 200);
  }
  check();
}
</script>
